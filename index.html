<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EatOut 10</title>
<link rel="icon" href="favicon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
 body { background: #F7BFC3; margin: 0; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
header { background: #d1a2a5; height: 80px; display: flex; align-items: center; padding: 0 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
.container { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; }
#fb { background: transparent; display: block; }
.page { background: white; overflow: hidden; }
canvas { width: 100.6%; height: 100%; object-fit: fill; position: relative; left: -0.3%; }
video { width: 100.6%; height: 100%; object-fit: cover; background: black; position: relative; left: -0.3%; }
#L { position: fixed; inset: 0; background: #F7BFC3; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; }
.spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="L"><div class="spinner"></div>Sincronizando...</div>
<header><img src="logo.png" style="height:45px"></header>
<div class="container" id="C"><div id="fb"></div></div>
<script>
 let pf = null; 
 pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
async function init() {
 try {
 const resp = await fetch("./documento.pdf"); if(!resp.ok) throw new Error("No se encuentra documento.pdf");
 const buffer = await resp.arrayBuffer();
const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
const el = document.getElementById("fb"); const first = await pdf.getPage(1); const bVp = first.getViewport({scale:1});
for(let i=1; i<=pdf.numPages; i++) {
 const d = document.createElement("div"); d.className="page";
if(i === 3 && "video.mp4") {
 d.innerHTML = '<video loop playsinline data-v="' + i + '"><source src="video.mp4" type="video/mp4"></video>';
} else {
 const c = document.createElement("canvas"); const p = await pdf.getPage(i); const v = p.getViewport({scale:2});
c.height = Math.floor(v.height); c.width = Math.floor(v.width); await p.render({canvasContext:c.getContext("2d"), viewport:v}).promise;
d.appendChild(c); 
}
 el.appendChild(d);
 }
pf = new St.PageFlip(el, { width: Math.floor(bVp.width), height: Math.floor(bVp.height), size: "stretch", showCover: true, autoCenter: true, drawShadow: false });
const fit = () => { if(!pf) return; const r = bVp.width/bVp.height; const h = document.getElementById("C").clientHeight * 0.94; el.style.height = Math.floor(h)+"px"; el.style.width = Math.floor(h*r*2)+"px"; pf.update(); };
pf.loadFromHTML(document.querySelectorAll(".page")); window.onresize = fit; fit(); document.getElementById("L").style.display="none";
pf.on("flip", (e) => { document.querySelectorAll("video").forEach(v => { const p = parseInt(v.getAttribute("data-v")); if([e.data, e.data+1].includes(p-1)) v.play().catch(()=>{}); else v.pause(); }); });
} catch(e) { document.getElementById("L").innerHTML = "FALLO: " + e.message; }
 }
 window.onload = init;
</script>
</body>
</html>
